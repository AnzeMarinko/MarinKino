{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="text-center mb-5">
        <h3 class="display-6 fw-bold mb-3">Rože dobrega</h3>
        <p class="lead text-muted">Blog</p>
    </div>

    <div class="row mb-4">
        <div class="col-md-8 offset-md-2">
            <div class="card p-3">
                <form method="post" action="/blog/subscribe" class="row g-2 align-items-center">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="col-auto">
                        <label for="subscribe-email" class="col-form-label">Naroči se na nove objave:</label>
                    </div>
                    <div class="col-md-8">
                        <input type="email" name="email" id="subscribe-email" class="form-control" placeholder="Vaš e-poštni naslov">
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-primary" type="submit">Naroči</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="row">
        {% for post in posts %}
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100 shadow-sm">
                {% if post.image %}
                <a href="/blog/{{ post.id }}"><img src="/blog/image/{{ post.image }}" class="card-img-top" alt="{{ post.title }}"></a>
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ post.title }}</h5>
                    <p class="card-text text-muted">{{ post.excerpt|truncate(100) }}</p>
                    <p class="card-text"><small class="text-muted">{{ post.created_at_display }}</small></p>
                    <a href="/blog/{{ post.id }}" class="btn btn-outline-primary">Preberi več</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
