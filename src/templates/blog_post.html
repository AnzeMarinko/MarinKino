{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <article>
                <header class="mb-4">
                    <h1 class="display-4 fw-bold mb-3">{{ post.title }}</h1>
                    {% if post.subtitle %}
                    <p class="lead text-muted">{{ post.subtitle }}</p>
                    {% endif %}
                    <p class="text-muted">
                        <small>Objavljeno: {{ post.created_at_display }}</small>
                    </p>
                </header>
                
                {% if post.image %}
                <div class="mb-4">
                    <img src="{{ post.image }}" class="img-fluid rounded" alt="{{ post.image_desc or post.title }}">
                </div>
                <p class="small text-muted">{{ post.image_desc }}</p>
                {% endif %}
                
                <div class="blog-content">
                    {{ post.content_html|safe }}
                </div>
            </article>
            
            <hr class="my-5">
            
            <div class="text-center">
                <a href="/blog" class="btn btn-outline-primary">Nazaj na seznam blogov</a>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let startTime = Date.now();
    let readingTime = 0;
    let isReading = false;
    let readingInterval;
    
    function startReading() {
        if (!isReading) {
            isReading = true;
            readingInterval = setInterval(() => {
                readingTime += 5; // Increment by 5 seconds
            }, 5000); // Every 5 seconds
        }
    }
    
    function stopReading() {
        if (isReading) {
            clearInterval(readingInterval);
            isReading = false;
        }
    }
    
    // Start tracking when user starts reading (scroll or mouse move)
    function handleUserActivity() {
        startReading();
    }
    
    // Track user activity
    document.addEventListener('scroll', handleUserActivity);
    document.addEventListener('mousemove', handleUserActivity);
    document.addEventListener('keydown', handleUserActivity);
    document.addEventListener('click', handleUserActivity);
    
    // Stop tracking when page becomes hidden
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            stopReading();
        } else {
            startReading();
        }
    });
    
    // Send reading time before page unload
    window.addEventListener('beforeunload', function() {
        if (readingTime > 0) {
            const formData = new FormData();
            formData.append('reading_time', readingTime.toString());
            navigator.sendBeacon('/blog/track-reading/{{ post.id }}', formData);
        }
    });
    
    // Also send reading time periodically (every 10 seconds)
    setInterval(() => {
        if (readingTime > 0) {
            fetch('/blog/track-reading/{{ post.id }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    "X-CSRFToken": "{{ csrf_token() }}"
                },
                body: JSON.stringify({
                    reading_time: readingTime
                })
            });
        }
    }, 10000);
});
</script>
{% endblock %}
