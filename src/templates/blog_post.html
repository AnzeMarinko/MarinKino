{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <article>
                <header class="mb-4">
                    <h1 class="display-4 fw-bold mb-3">{{ post.title }}</h1>
                    {% if post.subtitle %}
                    <p class="lead text-muted">{{ post.subtitle }}</p>
                    {% endif %}
                    <p class="text-muted">
                        <small>Objavljeno: {{ post.created_at_display }}</small>
                    </p>
                </header>
                
                {% if post.image %}
                <div class="mb-4">
                    <img src="{{ post.image }}" class="img-fluid rounded" alt="{{ post.image_desc or post.title }}">
                </div>
                <p class="small text-muted">{{ post.image_desc }}</p>
                {% endif %}
                
                <div class="blog-content">
                    {{ post.content_html|safe }}
                </div>
            </article>
            
            <hr class="my-5">
            
            <div class="text-center">
                <a href="/blog" class="btn btn-outline-primary">Nazaj na seznam blogov</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
